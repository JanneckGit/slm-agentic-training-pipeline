# =============================================================================
# docker-compose.yml – Text-to-SQL Finetuning Pipeline
# =============================================================================
# Services:
#   sdg        – Data preparation + SDG Hub generation (CPU, calls API)
#   training   – Training Hub finetuning (GPU required)
#   vllm       – Optional: local vLLM server as teacher model (GPU)
#
# Usage (agentic pipeline):
#   docker compose run --rm sdg python data_pipeline/prepare_agentic_data.py --config config/pipeline_config.local.yaml
#   docker compose run --rm training python3 training_pipeline/train_traj.py --config config/pipeline_config.local.yaml
#   bash ops/teacher_bakeoff.sh          # teacher bake-off (serves candidates via the vllm service)
#   bash ops/traj_sft_pipeline.sh        # before-eval -> traj_sft -> merge -> after-eval
#
# Optional teacher model (local vLLM):
#   docker compose up -d vllm
#   # Wait for vLLM to be ready, then run SDG with backend: vllm_local
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # SDG Service – Synthetic data generation (no GPU needed)
  # ---------------------------------------------------------------------------
  sdg:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sdg
    image: text2sql-sdg:latest
    container_name: text2sql_sdg

    volumes:
      # Project code (live mount for development – remove for production)
      - ..:/app
      # Data directories (read-write, persist between runs)
      - ../data:/app/data
      - ../logs:/app/logs
      # HuggingFace model cache (shared with training service)
      - hf_cache:/data/hf_cache
      # Your local config with API keys (gitignored)
      - ../config/pipeline_config.local.yaml:/app/config/pipeline_config.local.yaml

    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/data/hf_cache
      - HF_TOKEN=${HF_TOKEN}
      - PYTHONPATH=/app
      # API keys can also be passed as env vars (alternative to config file)
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}

    # No deploy section as teacher called via API

  # ---------------------------------------------------------------------------
  # Training Service – Training Hub LoRA/SFT (GPU required)
  # ---------------------------------------------------------------------------
  training:
    build:
      context: ..
      dockerfile: docker/Dockerfile.training
    image: text2sql-training:latest
    container_name: text2sql_training

    volumes:
      - ..:/app
      - ../data:/app/data
      - ../logs:/app/logs
      - ../mlruns:/app/mlruns
      - hf_cache:/data/hf_cache
      - ../config/pipeline_config.local.yaml:/app/config/pipeline_config.local.yaml

    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/data/hf_cache
      - HF_TOKEN=${HF_TOKEN}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - PYTHONPATH=/app
      # TensorBoard logs
      - TENSORBOARD_LOGDIR=/app/logs/tensorboard
      # MLflow: same store as the eval + GRPO runs (mounted ../mlruns -> /app/mlruns above)
      - MLFLOW_TRACKING_URI=file:///app/mlruns
      - MLFLOW_EXPERIMENT_NAME=db_bahn_traj_sft
      - MLFLOW_ALLOW_FILE_STORE=true          # mlflow>=3.14 gates the plain file backend behind this

    # GPU access for training
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all    # Use all available GPUs (GB10 has 1)
              capabilities: [gpu]

    # Increase shared memory for DataLoader workers
    shm_size: '16gb'

  # ---------------------------------------------------------------------------
  # GRPO Service – verl (LoRA, async server-mode) on GB10/sm_121. RLVR pilot.
  # image text2sql-grpo:verl = the validated verl+vLLM-0.23-nightly+torch-2.11 stack
  #   (frozen via `docker commit grpo_gate text2sql-grpo:verl`; Dockerfile.grpo is the
  #    from-scratch reproducible fallback — nightly vLLM rolls, so prefer the committed image).
  # Run (GPU): docker compose --profile grpo run --rm grpo \
  #              training_pipeline/grpo_verl_runner.py --smoke --date <YYYYMMDD>
  # (entrypoint is python3, so pass the script path directly — NOT `python3 ...`.)
  # ---------------------------------------------------------------------------
  grpo:
    image: text2sql-grpo:verl
    build:
      context: ..
      dockerfile: docker/Dockerfile.grpo
    container_name: text2sql_grpo
    profiles: ["grpo"]            # only with: docker compose --profile grpo ...
    entrypoint: ["python3"]       # committed image's CMD is grpo_gate's keep-alive probe; override it

    volumes:
      - ..:/app                   # repo: runner imports evaluation/reward.py, reads config
      - ../data:/app/data
      - ../mlruns:/app/mlruns     # MLflow store shared with the SFT/eval runs
      - hf_cache:/data/hf_cache

    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/data/hf_cache
      - HF_TOKEN=${HF_TOKEN}
      - MLFLOW_TRACKING_URI=file:///app/mlruns   # land beside the SFT runs (experiment grpo_distill)
      - REWARD_TOKENIZER=Qwen/Qwen3-4B           # reward.py think-token count
      - PYTHONPATH=/app                          # frozen grpo image has no PYTHONPATH baked; reward.py import needs it
      - RAY_memory_monitor_refresh_ms=0          # Ray OOM-killer false-positives on unified memory
      - HYDRA_FULL_ERROR=1
      - VLLM_USE_FLASHINFER_SAMPLER=0            # GB10 sm_121 FlashInfer top-k/top-p sampler race (vLLM #43885) -> PyTorch-native sampler. THE GB10 rollout-wedge fix (enforce_eager was a red herring; cudagraph stays ON). Container-level so it reaches verl's colocated Ray rollout worker (verified via /proc/<worker>/environ) + survives supervisor resume.

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    shm_size: '16gb'

  # ---------------------------------------------------------------------------
  # Optional: Local vLLM Teacher Model
  # ---------------------------------------------------------------------------
  # Use this if you want to run the teacher model locally (no API costs).
  # The GB10's 128GB VRAM can run Qwen2.5-72B-Instruct in fp8/int4.
  # Start with: docker compose up -d vllm
  # Then set teacher.backend: vllm_local in config.
  # ---------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:latest
    container_name: text2sql_vllm_teacher
    profiles: ["vllm"]   # Only starts with: docker compose --profile vllm up

    volumes:
      - hf_cache:/data/hf_cache
      # RLVR-GRPO pilot: serve locally-merged checkpoints (e.g. qwen314b_student_thinking_merged)
      # for the reachability probe / SFT-baseline rollouts. VLLM_MODEL points into /app/data.
      - ../data:/app/data

    environment:
      - HF_HOME=/data/hf_cache
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      # RLVR-GRPO pilot: allow runtime LoRA load/unload (3a hot-swap weight-sync spike)
      - VLLM_ALLOW_RUNTIME_LORA_UPDATING=True
      # GB10 sm_121 FlashInfer top-k/top-p sampler race (vLLM #43885): PyTorch-native sampler so the
      # reachability probe / SDG / eval don't wedge (~96% util / ~13 W / throughput->0) under sustained
      # top_k/top_p sampling. THE fix (not enforce_eager). Drop once the image ships #44405 / flashinfer#3615.
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen3.5-4B}
      --dtype bfloat16
      --max-model-len ${VLLM_MAX_MODEL_LEN:-16384}
      --gpu-memory-utilization ${VLLM_GPU_UTIL:-0.85}
      --served-model-name ${VLLM_MODEL:-Qwen/Qwen3.5-4B}
      ${VLLM_EXTRA_ARGS:-}
      --host 0.0.0.0
      --port 8000

    ports:
      - "8000:8000"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    shm_size: '16gb'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # vLLM takes a while to load

  # ---------------------------------------------------------------------------
  # Optional: MLflow Tracking UI
  # ---------------------------------------------------------------------------
  # View training runs at http://localhost:5000
  # Start with: docker compose --profile mlflow up -d mlflow
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: text2sql_mlflow
    profiles: ["mlflow"]

    environment:
      - MLFLOW_ALLOW_FILE_STORE=true          # mlflow>=3.14 gates the plain file backend behind this

    command: >
      mlflow ui
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file:///mlruns

    ports:
      - "5000:5000"

    volumes:
      - ../mlruns:/mlruns

# ---------------------------------------------------------------------------
# Shared volumes
# ---------------------------------------------------------------------------
volumes:
  hf_cache:
    driver: local
    driver_opts:
      type: none
      # Change this path to where you want to store HF models on your GB10
      o: bind
      device: /data/hf_cache   # Create this directory on your host first!
