metadata:
  name: Text-to-SQL Enrichment Flow
  description: Enrich Text-to-SQL seed data with harder SQL variants, new schema+question pairs, and chain-of-thought reasoning traces
  version: 1.0.0
  author: text2sql-finetune-pipeline
  tags:
  - text-to-sql
  - sql-generation
  - question-generation
  - reasoning
  recommended_models:
    default: openai/gpt-4o
    compatible:
    - azure/gpt-4.1
    - hosted_vllm/Qwen/Qwen2.5-72B-Instruct
  dataset_requirements:
    required_columns:
    - question
    - schema
    - sql
    - complexity
    - domain
    optional_columns:
    - explanation
    - task_type
    min_samples: 1
  id: wise-stone-739
blocks:
- block_type: PromptBuilderBlock
  block_config:
    block_name: build_complexity_upgrade_prompt
    input_cols:
    - question
    - schema
    - sql
    - complexity
    - domain
    output_cols: complexity_upgrade_prompt
    prompt_config_path: prompts/complexity_upgrade.yaml
- block_type: LLMChatBlock
  block_config:
    block_name: generate_complexity_upgrade
    input_cols: complexity_upgrade_prompt
    output_cols: complexity_upgrade_raw
    max_tokens: 1024
    temperature: 0.8
    async_mode: true
- block_type: LLMResponseExtractorBlock
  block_config:
    block_name: extract_complexity_upgrade
    input_cols: complexity_upgrade_raw
    extract_content: true
    expand_lists: true
- block_type: TagParserBlock
  block_config:
    block_name: parse_upgraded_question
    input_cols: extract_complexity_upgrade_content
    output_cols: upgraded_question
    start_tags:
    - '[QUESTION]'
    end_tags:
    - '[/QUESTION]'
- block_type: TagParserBlock
  block_config:
    block_name: parse_upgraded_sql
    input_cols: extract_complexity_upgrade_content
    output_cols: upgraded_sql
    start_tags:
    - '[SQL]'
    end_tags:
    - '[/SQL]'
- block_type: TagParserBlock
  block_config:
    block_name: parse_upgraded_complexity
    input_cols: extract_complexity_upgrade_content
    output_cols: upgraded_complexity
    start_tags:
    - '[COMPLEXITY]'
    end_tags:
    - '[/COMPLEXITY]'
- block_type: PromptBuilderBlock
  block_config:
    block_name: build_schema_variant_prompt
    input_cols:
    - domain
    - complexity
    - task_type
    output_cols: schema_variant_prompt
    prompt_config_path: prompts/schema_variant.yaml
- block_type: LLMChatBlock
  block_config:
    block_name: generate_schema_variant
    input_cols: schema_variant_prompt
    output_cols: schema_variant_raw
    max_tokens: 1500
    temperature: 0.9
    async_mode: true
- block_type: LLMResponseExtractorBlock
  block_config:
    block_name: extract_schema_variant
    input_cols: schema_variant_raw
    extract_content: true
    expand_lists: true
- block_type: TagParserBlock
  block_config:
    block_name: parse_variant_schema
    input_cols: extract_schema_variant_content
    output_cols: variant_schema
    start_tags:
    - '[SCHEMA]'
    end_tags:
    - '[/SCHEMA]'
- block_type: TagParserBlock
  block_config:
    block_name: parse_variant_question
    input_cols: extract_schema_variant_content
    output_cols: variant_question
    start_tags:
    - '[QUESTION]'
    end_tags:
    - '[/QUESTION]'
- block_type: TagParserBlock
  block_config:
    block_name: parse_variant_sql
    input_cols: extract_schema_variant_content
    output_cols: variant_sql
    start_tags:
    - '[SQL]'
    end_tags:
    - '[/SQL]'
- block_type: PromptBuilderBlock
  block_config:
    block_name: build_reasoning_trace_prompt
    input_cols:
    - question
    - schema
    - sql
    output_cols: reasoning_trace_prompt
    prompt_config_path: prompts/reasoning_trace.yaml
- block_type: LLMChatBlock
  block_config:
    block_name: generate_reasoning_trace
    input_cols: reasoning_trace_prompt
    output_cols: reasoning_trace_raw
    max_tokens: 1024
    temperature: 0.3
    async_mode: true
- block_type: LLMResponseExtractorBlock
  block_config:
    block_name: extract_reasoning_trace
    input_cols: reasoning_trace_raw
    extract_content: true
    expand_lists: true
- block_type: TagParserBlock
  block_config:
    block_name: parse_reasoning_trace
    input_cols: extract_reasoning_trace_content
    output_cols: reasoning_trace
    start_tags:
    - '[REASONING]'
    end_tags:
    - '[/REASONING]'
