# =============================================================================
# Agentic SLM Training Pipeline – Central Configuration (the ONLY config file)
# =============================================================================
# No secrets needed: the teacher is a local vLLM server (dummy key). The old
# gitignored pipeline_config.local.yaml override was abolished 2026-07-15.
#
# 2026-07-15 cleanup: this file now contains ONLY keys that a script actually
# reads (verified by grep). Run-specific hyperparameters live as CLI flags in
# the ops/ scripts (the source of truth for how runs were launched).
# =============================================================================

# Global pipeline seed – world-state seeding, task-gen, rollouts and traj_sft (train_traj reads it).
seed: 42

# -----------------------------------------------------------------------------
# TEACHER MODEL — served locally via the vllm compose service.
# (rollout.py reads teacher.vllm_local; other backends were removed 2026-07-15 —
#  no script read them. Serving flags per model: ops/teacher_bakeoff.sh.)
# -----------------------------------------------------------------------------
teacher:
  vllm_local:
    api_base: "http://localhost:8000/v1"
    api_key: "token-local"                   # vLLM needs any non-empty key
    model: "Qwen/Qwen3.6-35B-A3B"            # bake-off winner (92% yield, ~16s/rollout); must match --served-model-name
    max_tokens: 2048                         # fallback only — trajectory.max_tokens_per_turn wins

# -----------------------------------------------------------------------------
# STUDENT MODEL (the SLM to be finetuned)
# -----------------------------------------------------------------------------
student:
  # HuggingFace model ID or local path — dense, text-only, thinking (verl-GRPO-proven on sm_121).
  # NOT the MM hybrid Qwen3.5-4B: multimodal baggage + linear-attn rollout-kernel risk for Stage-2 GRPO.
  model_id: "Qwen/Qwen3-4B"
  # Set to a local path if you've already downloaded the model:
  # model_path: "/data/models/Qwen3-4B"

# -----------------------------------------------------------------------------
# DATA PATHS
# -----------------------------------------------------------------------------
data:
  raw_dir: "./data/raw"    # generated/final paths live as argparse defaults in the pipeline scripts

  # ---------------------------------------------------------------------------
  # AGENTIC SFT data basis (Stage-1 mix) — public tool-calling sets.
  # Fetched by data_pipeline/prepare_agentic_data.py into data/raw/{toolace,areal}/.
  # Public (not gated) — no HF token needed. Script has built-in defaults, so this
  # block is optional / for documentation + overrides.
  # (TaskBench was acquired once but deliberately dropped from the mix.)
  # ---------------------------------------------------------------------------
  agentic:
    toolace:                                    # tool-call basics
      dataset: "Team-ACE/ToolACE"               # Apache-2.0
      split: "train"                            # 11,300 ShareGPT rows
    areal:                                      # tau2-bench flows (AReaL) — per-turn SFT + RL tasks
      dataset: "inclusionAI/AReaL-tau2-data"    # Apache-2.0, public
      expected:                                 # from HF card 2026-07-08 — validate_areal.py hard-fails on mismatch
        sft_rows: 33531
        rl_rows: 1982
        sft_domains: {airline: 12842, retail: 11395, telecom: 9294}
        rl_domains:  {airline: 1148,  retail: 563,   telecom: 271}

# -----------------------------------------------------------------------------
# TRAINING (traj_sft — Stage 1). train_traj.py reads training.lora.* plus the four
# hyperparameters below as CLI fallbacks. The ACTUAL run recipe (epochs 2, micro 8,
# --max-seq-len 12288, FA2 + Liger + NEFTune) is launched by ops/traj_sft_pipeline.sh.
# -----------------------------------------------------------------------------
training:
  # LoRA hyperparameters
  lora:
    # lora rank controls how "deep" the training is --> how many weights optimized per matrix
    # higher: learns more complex patterns. r=32/alpha=64 (ratio 2 kept): more capacity for the broad
    # agentic task (3 domains + tools + German); still <2% of base. Bumped from 16/32.
    r: 32
    alpha: 64
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"

  learning_rate: 2.0e-4
  micro_batch_size: 8            # traj_sft @ 12288: fits with Liger fused CE (--liger; without it micro 8 OOMs 55G)
  gradient_accumulation_steps: 2 # -> effective batch 16 (micro 8 x accum 2); Liger smoke-validated no-OOM @12k
  lr_scheduler: "cosine"

# -----------------------------------------------------------------------------
# GRPO (Stage 2) — REMOVED 2026-07-15: the SQL-era verl runner + its config were
# deleted; the agentic rebuild (reward = evaluation/trajectory_reward.py:compute_score,
# data = rl_train split + AReaL RL tasks) will define fresh keys here.
# Validated GB10/verl load-bearing flags: load_format=auto, FlashInfer sampler off,
# rep-pen source patch — all applied in ops/grpo_smoke.sh.
# Frozen stack: image text2sql-grpo:verl (+ docker/Dockerfile.grpo as rebuild recipe).
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# DB_BAHN — grounded synthetic DB tool-calling traces (Stage-1 leg 3).
# World-state seeded from gtfs.de de_fv (CC-BY-4.0) + sha256-seeded synthetic tables;
# frozen sim-clock 2026-06-29, fault-rate 0.35 — all passed as CLI args to
# seed_worldstate.py / gen_tasks.py (documentation only, no script reads a db_bahn block).
# Domain code: sdg_pipeline/db_bahn/ (tau2 runtime-registration; needs the Py3.12 tau2 venv).
# -----------------------------------------------------------------------------

# Rollout / synthesis knobs (rollout.py reads exactly these three; everything else —
# concurrency, max-turns, k, timeouts, branch-on-fail — is CLI, see ops/gen_traces.sh).
trajectory:
  max_tokens_per_turn: 3072              # wave-3: headroom for per-turn <think>; a turn that HITS
                                         # this cap counts as a failed attempt (loop) -> branch/regen
  # official Qwen3.6 thinking-mode recipe (model card, 2026-07-18): temp 1.0 / top_p 0.95 /
  # top_k 20 / min_p 0 / presence_penalty 1.5 (the anti-repetition knob). Alternative
  # "precise" preset (temp 0.6 / presence 0.0) lost/won in smoke S3 — see synthesis log.
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  min_p: 0.0
  presence_penalty: 1.5
  enable_thinking: true                  # wave-3 hard rule: ALWAYS generate with thinking;
                                         # reasoning is captured inline as <think>…</think>
  # Teacher bake-off: candidates + serving flags live in ops/teacher_bakeoff.sh (the
  # single source of truth).
