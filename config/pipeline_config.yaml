# =============================================================================
# Text-to-SQL Finetuning Pipeline – Central Configuration
# =============================================================================
# Copy this file to pipeline_config.local.yaml and fill in your secrets.
# pipeline_config.local.yaml is gitignored – never commit secrets.
# =============================================================================

# Global pipeline seed – shared von mix_datasets / train / evaluate, damit
# Splits, LoRA-Init und Eval-Subsample über Runs hinweg reproduzierbar sind.
seed: 42

# -----------------------------------------------------------------------------
# COMPLEXITY CLASSES – Single Source of Truth
# -----------------------------------------------------------------------------
# Die gültige Arbeitsmenge der SQL-Komplexitätsklassen für die GESAMTE Pipeline
# (prepare_data-Seedfilter, mix-Gate, Eval-Anzeige). CTEs sind bewusst
# ausgeschlossen: alle CTE-Golds im Seed-Datensatz sind PostgreSQL-DML-CTEs
# (WITH ... AS (UPDATE/DELETE/INSERT ...)), in SQLite nicht ausführbar und für
# Text-to-SQL off-task. Wieder-Aufnahme später möglich, indem hier ergänzt wird
# (z.B. saubere Lese-CTEs aus Spider/BIRD).
complexity_classes:
  - basic SQL
  - single join
  - aggregation
  - subqueries
  - set operations
  - window functions
  - multiple_joins

# -----------------------------------------------------------------------------
# TEACHER MODEL (for SDG / synthetic data generation)
# -----------------------------------------------------------------------------
teacher:
  # Which backend to use: "anthropic" | "openai" | "vllm_local" | "ollama_local"
  backend: "azure"

  # Azure openAI
  azure:
    api_key: ""
    api_base: ""
    model: "gpt-4.1"
    deployment_name: "gpt-4.1"
    max_tokens: 2048
    temperature: 0.7

  # OpenAI-compatible API – standard OpenAI or generic custom endpoint
  openai:
    api_key: "YOUR_API_KEY"
    model: "gpt-4o"
    api_base: "https://YOUR_ENDPOINT/v1"     # include /v1
    max_tokens: 2048
    temperature: 0.7

  # Anthropic Claude API (used when backend: anthropic)
  anthropic:
    api_key: "YOUR_ANTHROPIC_API_KEY"        # <-- fill in
    model: "claude-sonnet-4-20250514"
    max_tokens: 2048
    temperature: 0.7

  # Local vLLM server (used when backend: vllm_local)
  # Start with: docker compose up vllm
  vllm_local:
    api_base: "http://localhost:8000/v1"
    api_key: "token-local"                   # vLLM needs any non-empty key
    model: "Qwen/Qwen3.6-35B-A3B"            # SDG trace-distill teacher; must match vLLM --served-model-name
    max_tokens: 2048
    temperature: 0.7

  # Ollama local (used when backend: ollama_local)
  # Start with: ollama run llama3.1:70b
  ollama_local:
    api_base: "http://localhost:11434/v1"
    api_key: "ollama"
    model: "llama3.1:70b"
    max_tokens: 2048
    temperature: 0.7

# -----------------------------------------------------------------------------
# STUDENT MODEL (the SLM to be finetuned)
# -----------------------------------------------------------------------------
student:
  # HuggingFace model ID or local path
  model_id: "Qwen/Qwen3.5-4B"
  # Set to a local path if you've already downloaded the model:
  # model_path: "/data/models/Qwen3.5-4B"

# -----------------------------------------------------------------------------
# DATA PATHS
# -----------------------------------------------------------------------------
data:
  raw_dir: "./data/raw"
  generated_dir: "./data/generated"
  final_dir: "./data/final"

  # Finales Eval-Test-Set: ausführbarkeits-gefiltert, 7 Klassen, keine CTEs.
  # Die mix-produzierte test.jsonl ist NICHT ausführbarkeits-gefiltert und wird
  # fürs finale Eval ignoriert. Pfad relativ zu final_dir.
  eval_test_file: "test_clean.jsonl"

  # Seed dataset from HuggingFace
  seed_dataset: "gretelai/synthetic_text_to_sql"
  seed_split: "train"
  # How many seed examples to sample for SDG enrichment
  seed_sample_size: 2000 #2000

  # How many synthetic examples to generate
  sdg_seed_input_size: 750 # 5000

  max_concurrency: 5
  min_seconds_between_batches: 10

  # Final dataset mix ratio: seed vs synthetic
  mix_ratio:
    seed: 0.4        # % of original seed data
    synthetic: 0.6   # % of newly generated data

# -----------------------------------------------------------------------------
# SDG PIPELINE (SDG Hub)
# -----------------------------------------------------------------------------
sdg:
  # Which flows to run (defined in sdg_pipeline/flows/)
  flows:
    - complexity_upgrade      # Upgrade simple SQL to harder variants
    - schema_variant          # Generate new schema+query combos
    - reasoning_trace         # Add chain-of-thought SQL reasoning

  # Async batch size for LLM calls
  async_batch_size: 32

  # Quality filter: minimum "complexity score" to keep a generated example
  min_quality_score: 0.7

  # Output format for generated data
  output_format: "jsonl"

# -----------------------------------------------------------------------------
# TRAINING (Training Hub)
# -----------------------------------------------------------------------------
training:
  algorithm: "lora_sft"      # Options: "lora_sft" | "sft" | "osft"

  # LoRA hyperparameters (used for lora_sft)
  lora:
    # lora rank controls how "deep" the training is --> how many weights optimized per matrix
    # higher: learns more complex patterns
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    load_in_4bit: false       # Set true to use QLoRA (saves VRAM)

  # Training hyperparameters
  num_epochs: 3
  learning_rate: 2.0e-4
  micro_batch_size: 8
  gradient_accumulation_steps: 4
  max_seq_len: 2048
  warmup_ratio: 0.03 # tbd: warmup_ratio is deprecated and will be removed in v5.2. Use `warmup_steps` instead.
  lr_scheduler: "cosine"

  # Checkpointing
  save_steps: 200
  eval_steps: 200
  logging_steps: 10

  # Output
  checkpoint_dir: "./data/final/checkpoints"

# -----------------------------------------------------------------------------
# GRPO (RLVR / LoRA) — verl backend, async server-mode on GB10/sm_121.
# Run via training_pipeline/grpo_verl_runner.py (in the grpo container; Dockerfile.grpo).
# Load-bearing recipe + metric mapping: docs/experiments-verl_RL_lora-grpo.md.
# -----------------------------------------------------------------------------
grpo:
  # merged bf16 4B-SFT-thinking base, SHARDED (Stage A merge). verl's rollout loads
  # this merged base FROM DISK (load_format=auto) and the LoRA syncs on top; the FSDP
  # actor also loads this checkpoint. (load_format=dummy = random rollout weights = the bug.)
  base_model: "data/final/checkpoints/qwen34b_student_thinking_merged_sharded"
  train_files: "data/final/grpo/weak_prompts_reachable.jsonl"   # from reachability (Stage F)
  val_files:   "data/final/weak_test_clean.jsonl"               # held-out -> val-core/sql_exec/acc/mean@1
  reward_tokenizer: "Qwen/Qwen3-4B"        # reward.py think-token count (env REWARD_TOKENIZER)
  sft_data_snapshot: "data/final/checkpoints/t-qwen3635ba3b-bf16_s-qwen314b_sdg750_2ep_seed42_20260618_0053_thinking/data_snapshot"  # build_weak_pool leakage guard: SFT train/eval questions to exclude (hard-fail if missing)

  num_generations: 8             # GRPO group size; do NOT raise (long thinking traces dominate cost)
  temperature: 1.0
  top_p: 0.95                    # loop-fix (Pilot-Prep [A]): Qwen3 default (verl default 1.0) — REACHES the verl rollout sampler
  top_k: 20                      # loop-fix: Qwen3 default (verl default -1) — REACHES the verl rollout sampler
  repetition_penalty: 1.1        # loop-fix: REACHES the rollout via the rep-pen SOURCE PATCH (stock verl hard-codes 1.0; see docker/Dockerfile.grpo). The terminating lever (standalone-proven).
  learning_rate: 1.0e-6
  kl_beta: 0                     # -> actor.use_kl_loss=False + algorithm.use_kl_in_reward=False
  max_prompt_length: 512         # weak-candidate prompts: p99~392 tok, max~465 tok
  max_completion_length: 2048    # cap-2048 detox re-measure: half of 4096 -> faster eager step + bounds any verl loop tail (reachability max ~953 tok, so 2048 still ample). max_model_len = 512+2048 = 2560
  reward_timeout_s: 3
  row_cap: 100000
  gpu_memory_utilization: 0.45   # 4B is small; ample headroom beside the FSDP actor
  enforce_eager: false           # cudagraph ON (verl default FULL_AND_PIECEWISE). The GB10 wedge was NOT a cudagraph bug — enforce_eager was a RED HERRING (the rollout wedged at mns=32 *despite* eager). Real cause = the FlashInfer top-k/top-p sampler race (vLLM #43885), fixed by VLLM_USE_FLASHINFER_SAMPLER=0 (set in docker-compose grpo env + the runner). Verified 2026-06-30: cudagraph ON + sampler off + mns=32 ran 3 verl steps wedge-free, ~10 min/step (vs mns=16/eager ~13).
  rollout_max_num_seqs: 32       # back to 32. mns is only a wedge-FREQUENCY lever (less concurrency = fewer/narrower FlashInfer-sampler CTA groups = rarer race), NOT a fix. With VLLM_USE_FLASHINFER_SAMPLER=0 the race is eliminated, so 32 is safe (verified wedge-free at mns=32, 2026-06-30).
  rollout_max_num_batched_tokens: 4096   # verl default 8192
  load_format: auto              # ROOT-CAUSE FIX: rollout vLLM loads the real merged base from disk (dummy=random weights=garbage rollouts); LoRA syncs on top via add_lora. HYBRID keeps dummy by default (vllm_async_server.py:138) -> must force auto.
  lora_rank: 16
  lora_alpha: 32
  train_batch_size: 32           # prompts per step (real pilot)
  total_epochs: 2                # pilot: 2 epochs over 831 reachable (~52 steps @ batch 32) -> reward lift visible, ~6-7 h, overnight-feasible
  save_freq: 5                   # checkpoint every 5 steps (default): per-step (save_freq=1) is overkill + bloats disk (50 ckpts x ~8.6GB = 430GB). Recovery backstop only — with VLLM_USE_FLASHINFER_SAMPLER=0 the sampler-race wedge is fixed (see enforce_eager note); a residual wedge/crash costs <=5 steps (verl auto-resume; val-resume-skip patch avoids re-val).
  test_freq: 13                  # validate held-out (240) ~2x/epoch (~4 pts + step-0 baseline = a curve); test_freq=1 = the runner default = val EVERY step = ~5h val + 2x wedge-exposure (held-out EX moves over the epoch, not the step)

  # MLflow: same store as SFT/eval runs; new experiment beside sft_distill.
  mlflow_tracking_uri: "file:///app/mlruns"
  mlflow_experiment: "grpo_distill"          # -> verl trainer.project_name
  run_name_prefix: "grpo_qwen3_4b_thinking"  # -> trainer.experiment_name (runner appends date)

  # --- end-to-end SMOKE overrides (runner --smoke) -----------------------------
  # RAW weak_candidates (NOT reachability-filtered): the smoke proves pipeline MECHANICS,
  # NOT the health of the real (filtered + 50%-biased) training signal. Do not over-read.
  smoke:
    # Tiny end-to-end verify run (runner --smoke). REPURPOSED (Pilot-Prep [A]+[B]) to PROVE the loop-fix
    # in verl's OWN rollout sampler: 16 hard window/set-ops prompts (the ones that looped) at top_p/top_k
    # control, cap 4096 -> check response_length << cap + clip_ratio << 1 + no 3-gram loop. (The earlier
    # smoke already proved pipeline MECHANICS end-to-end at cap 2048/8192: data->rollout->reward(dict)->
    # metrics->console+mlflow, weight-sync timing_s/update_weights, no OOM 16.95GB — see experiments doc.)
    train_files: "data/final/grpo/_verify_hard16.jsonl"   # 8 set-ops (smoke-looped) + 8 window, hardest
    n_prompts: 16
    train_batch_size: 16         # 16 / 16 = 1 step per epoch
    total_epochs: 1              # cap-2048 detox: exactly ONE complete step (measure a clean step's time), NOT sustained
    max_completion_length: 2048  # cap-2048 detox: bounds the loop tail at 2048 + halves worst-case gen; clip_ratio reveals clean-vs-loop
    val_before_train: false      # focus the gate on the TRAIN rollout sampler (the loop path); skip slow greedy val
    save_freq: -1                # throwaway verify -> no checkpoint
    test_freq: 1000
    n_val: 2

# -----------------------------------------------------------------------------
# INFRASTRUCTURE
# -----------------------------------------------------------------------------
infra:
  gpu_memory_utilization: 0.85

  # Logging
  log_level: "INFO"
  log_dir: "./logs"

  # HuggingFace cache (important on remote machines to avoid re-downloads)
  hf_cache_dir: "/data/hf_cache"   # map this in docker-compose volume
